name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    permissions:
      contents: write
      security-events: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21

      - name: Copy CI gradle.properties
        run: |
          mkdir -p ~/.gradle
          cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Create dummy google-services.json for CI
        run: |
          for flavor_dir in dev stg prod; do
            mkdir -p "app/src/$flavor_dir"
            python3 -c "
          import json, sys
          pkgs = ['cloud.poche.app', 'cloud.poche.app.debug',
                  'cloud.poche.app.dev', 'cloud.poche.app.dev.debug',
                  'cloud.poche.app.stg', 'cloud.poche.app.stg.debug']
          clients = [{'client_info': {'mobilesdk_app_id': '1:000000000000:android:0000000000000000',
                      'android_client_info': {'package_name': p}},
                      'api_key': [{'current_key': 'dummy'}]} for p in pkgs]
          doc = {'project_info': {'project_number': '000000000000', 'project_id': 'dummy-ci',
                 'storage_bucket': 'dummy-ci.appspot.com'}, 'client': clients, 'configuration_version': '1'}
          json.dump(doc, open('app/src/$flavor_dir/google-services.json', 'w'))
          "
          done

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          dependency-graph: generate-and-submit

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Run detekt
        run: ./gradlew detekt

      - name: Run unit tests
        run: ./gradlew testDevDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDevDebug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: '**/build/test-results/**/TEST-*.xml'
          retention-days: 14

  instrumented-test:
    needs: build-and-test
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21

      - name: Copy CI gradle.properties
        run: |
          mkdir -p ~/.gradle
          cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Create dummy google-services.json for CI
        run: |
          for flavor_dir in dev stg prod; do
            mkdir -p "app/src/$flavor_dir"
            python3 -c "
          import json
          pkgs = ['cloud.poche.app', 'cloud.poche.app.debug',
                  'cloud.poche.app.dev', 'cloud.poche.app.dev.debug',
                  'cloud.poche.app.stg', 'cloud.poche.app.stg.debug']
          clients = [{'client_info': {'mobilesdk_app_id': '1:000000000000:android:0000000000000000',
                      'android_client_info': {'package_name': p}},
                      'api_key': [{'current_key': 'dummy'}]} for p in pkgs]
          doc = {'project_info': {'project_number': '000000000000', 'project_id': 'dummy-ci',
                 'storage_bucket': 'dummy-ci.appspot.com'}, 'client': clients, 'configuration_version': '1'}
          json.dump(doc, open('app/src/$flavor_dir/google-services.json', 'w'))
          "
          done

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Run instrumented tests (GMD)
        run: |
          ./gradlew :app:pixel2Api34DevDebugAndroidTest \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            -Pandroid.experimental.testOptions.managedDevices.setupTimeoutMinutes=20

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: instrumented-test-results
          path: '**/build/reports/androidTests/'
          retention-days: 14

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/dependency-review-action@ce3cf9537a52e8119d91fd484ab5b8a807627bf8 # v4.6.0
        continue-on-error: true
        with:
          fail-on-severity: high
