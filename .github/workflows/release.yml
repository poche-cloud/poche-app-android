name: Release

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      version:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21

      - name: Copy CI gradle.properties
        run: |
          mkdir -p ~/.gradle
          cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_PROD }}" | base64 -d > app/src/prod/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/upload-keystore.jks

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build release AAB
        run: ./gradlew bundleProdRelease
        env:
          KEYSTORE_PATH: /tmp/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/upload-keystore.jks

      - uses: actions/upload-artifact@45062af2dc0756795fb5991116077bab3d46b381 # v4.6.1
        with:
          name: release-aab
          path: app/build/outputs/bundle/prodRelease/app-prod-release.aab
          retention-days: 30

  deploy:
    needs: build-release
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    environment:
      name: production

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download AAB
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: release-aab

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@935ef9c66407da03f5873d064a18766df47f68d7 # v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: cloud.poche.app
          releaseFiles: app-prod-release.aab
          track: ${{ github.event.inputs.track }}
          status: completed
