name: Release

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      version:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21

      - name: Copy CI gradle.properties
        run: |
          mkdir -p ~/.gradle
          cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      # TODO: google-services.json を Secrets から復元
      # - name: Decode google-services.json
      #   run: echo "${{ secrets.GOOGLE_SERVICES_PROD }}" | base64 -d > app/src/prod/google-services.json

      # TODO: Keystore を Secrets から復元
      # - name: Decode keystore
      #   run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/upload-keystore.jks

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # TODO: 署名付きビルド (Secrets 設定後に有効化)
      # - name: Build release AAB
      #   run: ./gradlew bundleProdRelease
      #   env:
      #     KEYSTORE_PATH: /tmp/upload-keystore.jks
      #     KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      #     KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #     KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # TODO: Keystore 一時ファイル削除
      # - name: Cleanup keystore
      #   if: always()
      #   run: rm -f /tmp/upload-keystore.jks

      - name: Placeholder build
        run: echo "Release build is not yet configured. Set up Secrets first."

      # TODO: AAB アーティファクト アップロード
      # - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      #   with:
      #     name: release-aab
      #     path: app/build/outputs/bundle/prodRelease/app-prod-release.aab
      #     retention-days: 30

  deploy:
    needs: build-release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: false # TODO: Secrets 設定後に有効化

    environment:
      name: production

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # TODO: Play Store デプロイ (Secrets 設定後に有効化)
